; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:disco_l475vg_iot01a]
platform = ststm32
board = disco_l475vg_iot01a
framework = stm32cube
build_flags =
  -I"${platformio.packages_dir}/framework-stm32cubel4/Drivers/BSP/B-L475E-IOT01"
  -I"${platformio.packages_dir}/framework-stm32cubel4/Drivers/BSP/Components/lsm6dsl"
lib_ignore = lsm6dsl

; Flash via the on-board ST-LINK
upload_protocol = stlink
debug_tool = stlink


; ===== Serial monitor (ST-LINK VCP) =====
monitor_speed = 115200
monitor_eol = LF

; If COM port sometimes changes, you can uncomment and set it:
; monitor_port = COM5

; Useful monitor filters (optional)
; - time: adds timestamps
; - printable: strips weird control chars
monitor_filters = time, printable

; ===== Optional: better upload reliability =====
; If you ever get "no device found" issues, try:
; upload_flags =
;   -c
;   set CPUTAPID 0x2ba01477

; ===== Optional: build extras =====
; build_type = debug
; build_flags =
;   -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
